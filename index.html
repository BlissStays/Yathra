<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Yathra — Bus Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--border:#2d3748;
    --accent:#f59e0b;--accent2:#10b981;--text:#f0f6fc;--muted:#8b949e;
    --user-bubble:#1e3a5f;--bot-bubble:#1f2937;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
  button,input,textarea,a,select{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  input,select,textarea{-webkit-appearance:none;border-radius:0;}
  input[type=text],input[type=tel],input[type=email],textarea{font-size:16px!important;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right));padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:12px;}
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
  .header-tabs{display:flex;gap:4px;}
  .tab-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px;}
  .tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
  .tab-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:8px;}
  .lang-switcher{display:flex;gap:4px;}
  .lang-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .lang-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500;}
  .lang-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

  /* VIEWS */
  .view{display:none;flex:1;flex-direction:column;overflow:hidden;}
  .view.active{display:flex;}

  /* CHAT */
  .chat-container{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
  .chat-container::-webkit-scrollbar{width:4px;}
  .chat-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .message{display:flex;gap:12px;max-width:760px;animation:fadeSlideIn .3s ease forwards;opacity:0;}
  @keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse;}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:4px;}
  .bot .avatar{background:var(--accent);color:#000;}
  .user .avatar{background:var(--user-bubble);color:var(--text);}
  .bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;max-width:620px;}
  .bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-top-left-radius:4px;}
  .user .bubble{background:var(--user-bubble);border:1px solid #2d4a6e;border-top-right-radius:4px;}

  /* RESULTS */
  .results-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:4px;max-width:640px;}
  .results-header{padding:12px 16px;background:var(--surface2);font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
  .bus-option{border-bottom:1px solid var(--border);}
  .bus-option:last-child{border-bottom:none;}
  .bus-option-main{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;transition:background .15s;}
  .bus-option-main:hover{background:var(--surface2);}
  .bus-option.expanded{border-left:3px solid var(--accent);}
  .bus-info{flex:1;min-width:0;}
  .bus-top-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .bus-operator{font-weight:600;font-size:14px;}
  .amenity-badges{display:flex;gap:4px;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;}
  .badge-ac{background:rgba(99,179,237,.15);color:#63b3ed;border:1px solid rgba(99,179,237,.3);}
  .badge-night{background:rgba(159,122,234,.15);color:#b794f4;border:1px solid rgba(159,122,234,.3);}
  .badge-wifi{background:rgba(72,187,120,.15);color:#68d391;border:1px solid rgba(72,187,120,.3);}
  .badge-usb{background:rgba(246,173,85,.15);color:#fbd38d;border:1px solid rgba(246,173,85,.3);}
  .badge-sleeper{background:rgba(252,129,74,.15);color:#fc8181;border:1px solid rgba(252,129,74,.3);}
  .badge-express{background:rgba(236,72,153,.15);color:#f687b3;border:1px solid rgba(236,72,153,.3);}
  .badge-semi{background:rgba(113,128,150,.15);color:#a0aec0;border:1px solid rgba(113,128,150,.3);}
  .badge-luxury{background:rgba(245,158,11,.15);color:#f6ad55;border:1px solid rgba(245,158,11,.3);}
  .badge-normal{background:rgba(113,128,150,.1);color:#718096;border:1px solid rgba(113,128,150,.2);}
  .bus-details{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
  .bus-detail-item{display:flex;align-items:center;gap:3px;}
  .bus-meta-row{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap;}
  .seats-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
  .seats-ok{background:#1a2f1a;color:var(--accent2);}
  .seats-low{background:#2f1a1a;color:#f87171;}
  .star-rating{display:flex;align-items:center;gap:4px;font-size:12px;}
  .stars{color:var(--accent);}
  .rating-count{color:var(--muted);}
  .bus-price{text-align:right;flex-shrink:0;}
  .price-amount{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);font-weight:700;}
  .price-label{font-size:11px;color:var(--muted);}
  .view-btn{display:block;margin-top:8px;padding:6px 14px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;text-align:center;}
  .view-btn:hover{background:var(--accent);color:#000;}
  .bus-expanded-panel{border-top:1px solid var(--border);background:#0f1923;}
  .expanded-inner{display:grid;grid-template-columns:1fr 1fr;}
  .exp-left{padding:16px;border-right:1px solid var(--border);}
  .exp-right{padding:16px;}
  .exp-section-title{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .bus-photo-img{width:100%;height:130px;border-radius:10px;object-fit:cover;margin-bottom:12px;display:block;}
  .review-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
  .review-item:last-child{border-bottom:none;}
  .review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
  .reviewer-name{font-size:12px;font-weight:500;}
  .review-stars{font-size:11px;color:var(--accent);}
  .review-text{font-size:12px;color:var(--muted);line-height:1.4;}
  .review-date{font-size:10px;color:#4a5568;margin-top:2px;}
  .seat-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:2px;}
  .ld-avail{background:var(--surface2);border:1px solid var(--border);}
  .ld-taken{background:#2f1a1a;border:1px solid #4a2020;}
  .ld-selected{background:var(--accent);}
  .bus-layout{display:flex;flex-direction:column;gap:3px;}
  .seat-row{display:flex;align-items:center;gap:3px;}
  .seat-aisle{width:12px;flex-shrink:0;}
  .seat{width:26px;height:26px;border-radius:4px 4px 2px 2px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);transition:all .12s;flex-shrink:0;}
  .seat:hover:not(.taken){border-color:var(--accent);background:rgba(245,158,11,.15);color:var(--accent);}
  .seat.taken{background:#1a1010;border-color:#3a2020;cursor:not-allowed;color:#3a2020;}
  .seat.selected{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
  .seat-info{margin-top:10px;font-size:12px;color:var(--muted);min-height:18px;}
  .seat-info strong{color:var(--accent);}
  .book-btn-full{width:100%;margin-top:10px;padding:11px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .book-btn-full:hover:not(:disabled){background:#fbbf24;transform:translateY(-1px);}
  .book-btn-full:disabled{opacity:.4;cursor:not-allowed;}
  .quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .quick-reply{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .quick-reply:hover{border-color:var(--accent);color:var(--accent);background:rgba(245,158,11,.08);}
  .typing{display:flex;align-items:center;gap:4px;padding:12px 16px;}
  .typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
  .input-area{padding:16px 24px;padding-bottom:max(16px,env(safe-area-inset-bottom));padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .input-row{display:flex;gap:10px;align-items:flex-end;}
  .input-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;resize:none;min-height:48px;max-height:120px;outline:none;transition:border-color .2s;line-height:1.5;}
  .input-box:focus{border-color:var(--accent);}
  .input-box::placeholder{color:var(--muted);}
  .send-btn{width:48px;height:48px;background:var(--accent);border:none;border-radius:12px;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0;}
  .send-btn:hover{background:#fbbf24;transform:scale(1.05);}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .25s ease;}
  .modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
  .modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;line-height:1;transition:color .15s;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:20px 24px;}
  .modal-footer{padding:16px 24px 20px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);}
  .booking-summary{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:20px;font-size:13px;}
  .bsr{display:flex;justify-content:space-between;padding:3px 0;color:var(--muted);}
  .bsr span:last-child{color:var(--text);font-weight:500;}
  .bsp{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .total-val{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);font-weight:700;}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
  .form-input:focus{border-color:var(--accent);}
  .form-input::placeholder{color:var(--muted);}
  .form-input.error{border-color:#f87171;}
  .pay-btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .pay-btn:hover{background:#fbbf24;transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.3);}
  .pay-note{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;}

  /* PENDING */
  .payment-pending-card{background:var(--surface);border:1px solid #2d4a1e;border-radius:16px;padding:20px;max-width:440px;}
  .pending-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .pending-icon{width:36px;height:36px;border-radius:50%;background:rgba(245,158,11,.15);display:flex;align-items:center;justify-content:center;font-size:18px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pending-title{font-weight:600;font-size:15px;}
  .pending-subtitle{font-size:12px;color:var(--muted);}
  .pending-details{background:var(--surface2);border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px;}
  .pdr{display:flex;justify-content:space-between;padding:3px 0;}
  .pdr span:first-child{color:var(--muted);}
  .pdr span:last-child{font-weight:500;}
  .pay-link-btn{width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;margin-bottom:8px;}
  .pay-link-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(16,185,129,.3);}
  .simulate-pay-btn{width:100%;padding:10px;background:transparent;color:var(--muted);border:1px dashed var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:4px;}
  .simulate-pay-btn:hover{color:var(--accent2);border-color:var(--accent2);}
  .pending-ref{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;}
  .pending-ref code{font-family:monospace;letter-spacing:1px;}

  /* CONFIRM */
  .confirm-card{background:#0d2011;border:1px solid var(--accent2);border-radius:16px;padding:16px;max-width:420px;margin-top:4px;}
  .confirm-title{color:var(--accent2);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .confirm-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);}
  .confirm-label{color:var(--muted);}
  .confirm-value{font-weight:500;}
  .confirm-total{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .ref-code{background:var(--surface2);padding:8px 14px;border-radius:8px;font-family:monospace;font-size:13px;letter-spacing:2px;color:var(--accent);margin-top:10px;text-align:center;}
  .powered{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;opacity:.6;}

  /* MY BOOKINGS VIEW */
  .my-bookings-view{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
  .mb-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:32px 24px;padding-bottom:max(32px,env(safe-area-inset-bottom));}
  .mb-inner::-webkit-scrollbar{width:4px}
  .mb-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* VERIFY PANEL */
  .verify-panel{max-width:420px;margin:40px auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;}
  .verify-icon{font-size:40px;text-align:center;margin-bottom:16px;}
  .verify-title{font-family:'Playfair Display',serif;font-size:22px;text-align:center;margin-bottom:6px;}
  .verify-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.5;}
  .verify-step{display:none;}
  .verify-step.active{display:block;}
  .otp-row{display:flex;gap:10px;margin-top:16px;}
  .otp-input{flex:1;text-align:center;font-size:22px;font-weight:700;letter-spacing:4px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
  .otp-input:focus{border-color:var(--accent);}
  .verify-btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:16px;transition:all .2s;}
  .verify-btn:hover{background:#fbbf24;transform:translateY(-1px);}
  .verify-note{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;}
  .resend-btn{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;display:block;text-align:center;width:100%;}
  .otp-toast{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:12px;font-size:13px;text-align:center;color:var(--accent2);display:none;}

  /* BOOKINGS LIST */
  .bookings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .bh-title{font-family:'Playfair Display',serif;font-size:22px;}
  .bh-phone{font-size:13px;color:var(--muted);}
  .logout-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .logout-btn:hover{border-color:#f87171;color:#f87171;}
  .booking-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;transition:border-color .2s;}
  .booking-card:hover{border-color:var(--accent);}
  .bc-header{padding:14px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .bc-ref{font-family:monospace;font-size:13px;color:var(--accent);letter-spacing:1.5px;}
  .bc-status{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
  .status-confirmed{background:rgba(16,185,129,.15);color:var(--accent2);border:1px solid rgba(16,185,129,.3);}
  .status-pending{background:rgba(245,158,11,.15);color:var(--accent);border:1px solid rgba(245,158,11,.3);}
  .status-past{background:rgba(113,128,150,.15);color:var(--muted);border:1px solid rgba(113,128,150,.3);}
  .bc-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .bc-row{font-size:13px;}
  .bc-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
  .bc-val{margin-top:2px;font-weight:500;}
  .bc-price{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:16px;}
  .section-divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}

  /* ── iOS KEYBOARD FIX: prevent layout shift when keyboard opens ── */
  @supports (height: 100dvh) {
    body { height: 100dvh; }
  }

  /* ── RESPONSIVE: iPhone (≤430px wide) ── */
  @media (max-width: 430px) {
    .header{padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
    .logo-sub{display:none;}
    .logo-text{font-size:17px;}
    .header-tabs{gap:3px;}
    .tab-btn{padding:6px 10px;font-size:11px;gap:4px;}
    .lang-btn{padding:3px 7px;font-size:10px;}
    .chat-container{padding:14px;}
    .message{max-width:100%;}
    .bubble{max-width:100%;font-size:13px;}
    .input-area{padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
    .expanded-inner{grid-template-columns:1fr;}
    .exp-left{border-right:none;border-bottom:1px solid var(--border);}
    .results-card{max-width:100%;}
    .bus-option-main{flex-direction:column;align-items:flex-start;}
    .bus-price{display:flex;align-items:center;gap:10px;width:100%;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;margin-top:6px;}
    .view-btn{margin-top:0;}
    .modal{border-radius:16px 16px 0 0;max-height:92vh;margin-top:auto;}
    .modal-overlay{align-items:flex-end;padding:0;}
    .verify-panel{padding:24px 20px;margin:20px auto;}
    .bc-body{grid-template-columns:1fr;}
    .bc-row:last-child{grid-column:auto;}
    .mb-inner{padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));}
    .confirm-card{max-width:100%;}
    .payment-pending-card{max-width:100%;}
  }

  /* ── iPhone SE / very small (≤375px) ── */
  @media (max-width: 375px) {
    .logo-text{font-size:15px;}
    .logo-icon{width:28px;height:28px;font-size:14px;}
    .tab-btn{padding:5px 8px;font-size:11px;}
    .lang-switcher{gap:2px;}
    .lang-btn{padding:2px 5px;font-size:9px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div>
      <div class="logo-text">Yathra</div>
      <div class="logo-sub">යාත්‍රා · யாத்திரை</div>
    </div>
  </div>
  <div class="header-tabs">
    <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">🗺️ Book a Trip</button>
    <button class="tab-btn" id="tab-bookings" onclick="switchTab('bookings')">🎫 My Bookings</button>
  </div>
  <div class="header-right">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('si',this)">සිං</button>
      <button class="lang-btn" onclick="setLang('ta',this)">தமிழ்</button>
    </div>
  </div>
</div>

<!-- CHAT VIEW -->
<div class="view active" id="view-chat" style="flex-direction:column;">
  <div class="chat-container" id="chat"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="userInput" placeholder="Where do you want to go? / ඔබ කොතැනට යන්නේද?" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- MY BOOKINGS VIEW -->
<div class="view" id="view-bookings" style="flex-direction:column;">
  <div class="my-bookings-view">
    <div class="mb-inner" id="mb-inner">

      <!-- STEP 1: Enter phone -->
      <div class="verify-panel" id="verify-panel">
        <div class="verify-icon">🎫</div>
        <div class="verify-title">My Bookings</div>
        <div class="verify-sub">Enter your phone number to view your bookings. We'll send a verification code.</div>

        <div class="verify-step active" id="vstep-1">
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input class="form-input" id="login-phone" type="tel" placeholder="e.g. 077 123 4567" autocomplete="tel"/>
          </div>
          <button class="verify-btn" onclick="requestOTP()">Send Verification Code →</button>
          <div class="verify-note">We'll send a 4-digit code to your number</div>
        </div>

        <!-- STEP 2: Enter OTP -->
        <div class="verify-step" id="vstep-2">
          <div style="font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center">Code sent to <strong id="otp-phone-display" style="color:var(--text)"></strong></div>
          <div class="otp-toast" id="otp-toast"></div>
          <div class="form-group" style="margin-top:14px">
            <label class="form-label">Enter 4-Digit Code</label>
            <input class="otp-input" id="otp-input" type="text" maxlength="4" placeholder="• • • •"
              oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')verifyOTP()"/>
          </div>
          <button class="verify-btn" onclick="verifyOTP()">Verify & View Bookings</button>
          <button class="resend-btn" onclick="requestOTP(true)">Resend code</button>
          <div class="verify-note">Didn't get a code? Check your number or try again.</div>
        </div>
      </div>

      <!-- BOOKINGS LIST (hidden until verified) -->
      <div id="bookings-list" style="display:none;max-width:700px;margin:0 auto;"></div>
    </div>
  </div>
</div>

<script>
const CLAUDE_API = "https://api.anthropic.com/v1/messages";
let conversationHistory = [];
let isTyping = false;
const expandedLayouts = {};

// ── SESSION & STORAGE ──
let sessionPhone = null; // verified phone in current session

function saveBooking(bd) {
  const key = `bookings:${bd.phone}`;
  let list = [];
  try { const r = loadBookings(bd.phone); list = r || []; } catch(e){}
  list.unshift(bd);
  try { window.storage.set(key, JSON.stringify(list), false); } catch(e){ _localFallback[key] = JSON.stringify(list); }
}

const _localFallback = {};
async function loadBookings(phone) {
  const key = `bookings:${phone}`;
  try {
    const r = await window.storage.get(key, false);
    return r ? JSON.parse(r.value) : [];
  } catch(e) {
    return _localFallback[key] ? JSON.parse(_localFallback[key]) : [];
  }
}

// ── BOOKING CODE GEN ──
function genBookingCode(phone) {
  const ts = Date.now().toString(36).toUpperCase();
  const ph = phone.replace(/\D/g,'').slice(-4);
  const rand = Math.random().toString(36).substr(2,3).toUpperCase();
  return `YT-${ph}-${rand}${ts.slice(-3)}`;
}

// ── OTP (simulated) ──
let currentOTP = null;
let loginPhone = null;

function requestOTP(resend=false) {
  const inp = document.getElementById('login-phone');
  let phone = (resend ? loginPhone : inp?.value?.trim()) || '';
  if (!phone) { if(inp){inp.classList.add('error');inp.focus();} return; }
  loginPhone = phone;
  currentOTP = String(Math.floor(1000+Math.random()*9000));

  document.getElementById('vstep-1').classList.remove('active');
  document.getElementById('vstep-2').classList.add('active');
  document.getElementById('otp-phone-display').textContent = phone;

  const toast = document.getElementById('otp-toast');
  toast.style.display = 'block';
  toast.innerHTML = `📱 <strong>Demo OTP:</strong> Your code is <strong style="font-size:18px;letter-spacing:3px">${currentOTP}</strong>`;

  if (!resend) setTimeout(() => { document.getElementById('otp-input')?.focus(); }, 100);
}

function verifyOTP() {
  const entered = document.getElementById('otp-input').value.trim();
  const toast = document.getElementById('otp-toast');
  if (entered === currentOTP) {
    sessionPhone = loginPhone;
    showBookingsList(loginPhone);
  } else {
    toast.style.display = 'block';
    toast.style.color = '#f87171';
    toast.innerHTML = '❌ Incorrect code. Please try again.';
    document.getElementById('otp-input').value = '';
    document.getElementById('otp-input').focus();
  }
}

async function showBookingsList(phone) {
  document.getElementById('verify-panel').style.display = 'none';
  const container = document.getElementById('bookings-list');
  container.style.display = 'block';

  container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">⏳</div>Loading your bookings…</div>`;

  let bookings = [];
  try { bookings = await loadBookings(phone); } catch(e){}

  const header = `
    <div class="bookings-header">
      <div>
        <div class="bh-title">My Bookings</div>
        <div class="bh-phone">📱 ${phone}</div>
      </div>
      <button class="logout-btn" onclick="logoutBookings()">Sign Out</button>
    </div>`;

  if (!bookings || bookings.length === 0) {
    container.innerHTML = header + `
      <div class="empty-state">
        <div class="empty-icon">🎫</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">No bookings yet</div>
        <div>Book a trip from the <strong>Book a Trip</strong> tab and it'll appear here.</div>
      </div>`;
    return;
  }

  const now = new Date();
  const upcoming = bookings.filter(b => b.status === 'confirmed' && !isPast(b));
  const past = bookings.filter(b => b.status === 'confirmed' && isPast(b));
  const pending = bookings.filter(b => b.status === 'pending');

  let html = header;

  if (pending.length) {
    html += `<div class="section-divider">⏳ Awaiting Payment</div>`;
    html += pending.map(b => bookingCardHTML(b, 'pending')).join('');
  }
  if (upcoming.length) {
    html += `<div class="section-divider">✅ Upcoming Trips</div>`;
    html += upcoming.map(b => bookingCardHTML(b, 'confirmed')).join('');
  }
  if (past.length) {
    html += `<div class="section-divider">🕰 Past Trips</div>`;
    html += past.map(b => bookingCardHTML(b, 'past')).join('');
  }

  container.innerHTML = html;
}

function isPast(b) {
  if (!b.date) return false;
  try {
    const parts = b.date.match(/(\w+)\s+(\d+)\s+(\d+)/);
    if (!parts) return false;
    return new Date(b.date) < new Date();
  } catch(e){ return false; }
}

function bookingCardHTML(b, statusType) {
  const statusLabel = statusType==='confirmed' ? 'Confirmed' : statusType==='pending' ? 'Payment Pending' : 'Completed';
  const statusClass = statusType==='confirmed' ? 'status-confirmed' : statusType==='pending' ? 'status-pending' : 'status-past';
  return `
    <div class="booking-card">
      <div class="bc-header">
        <span class="bc-ref">${b.ref}</span>
        <span class="bc-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="bc-body">
        <div class="bc-row"><div class="bc-label">Route</div><div class="bc-val">${b.from} → ${b.to}</div></div>
        <div class="bc-row"><div class="bc-label">Operator</div><div class="bc-val">${b.operator}</div></div>
        <div class="bc-row"><div class="bc-label">Date</div><div class="bc-val">${b.date}</div></div>
        <div class="bc-row"><div class="bc-label">Departure</div><div class="bc-val">${b.departure}</div></div>
        <div class="bc-row"><div class="bc-label">Seats</div><div class="bc-val">${b.seatsStr}</div></div>
        <div class="bc-row"><div class="bc-label">Passenger</div><div class="bc-val">${b.name}</div></div>
        <div class="bc-row" style="grid-column:1/-1;margin-top:4px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <span style="color:var(--muted);font-size:12px">Total Paid</span>
          <span class="bc-price">Rs ${b.price}</span>
        </div>
      </div>
    </div>`;
}

function logoutBookings() {
  sessionPhone = null; loginPhone = null; currentOTP = null;
  document.getElementById('verify-panel').style.display = 'block';
  document.getElementById('bookings-list').style.display = 'none';
  document.getElementById('vstep-1').classList.add('active');
  document.getElementById('vstep-2').classList.remove('active');
  document.getElementById('otp-input').value = '';
  document.getElementById('login-phone').value = '';
  document.getElementById('otp-toast').style.display = 'none';
}

// ── TAB SWITCHER ──
function switchTab(tab) {
  document.getElementById('view-chat').classList.toggle('active', tab==='chat');
  document.getElementById('view-bookings').classList.toggle('active', tab==='bookings');
  document.getElementById('tab-chat').classList.toggle('active', tab==='chat');
  document.getElementById('tab-bookings').classList.toggle('active', tab==='bookings');
  if (tab==='bookings' && sessionPhone) showBookingsList(sessionPhone);
}

// ── AMENITY CONFIG ──
const AMENITY_MAP = {
  'AC':{cls:'badge-ac',icon:'❄️',label:'A/C'},
  'Semi-AC':{cls:'badge-semi',icon:'🌀',label:'Semi-AC'},
  'Normal':{cls:'badge-normal',icon:'🚌',label:'Normal'},
  'Night':{cls:'badge-night',icon:'🌙',label:'Night Bus'},
  'WiFi':{cls:'badge-wifi',icon:'📶',label:'WiFi'},
  'USB':{cls:'badge-usb',icon:'🔌',label:'USB'},
  'Sleeper':{cls:'badge-sleeper',icon:'🛏️',label:'Sleeper'},
  'Express':{cls:'badge-express',icon:'⚡',label:'Express'},
  'Luxury':{cls:'badge-luxury',icon:'✨',label:'Luxury'},
};
const BUS_PHOTOS = {
  'AC':'https://images.unsplash.com/photo-1570125909517-53cb21c89ff2?w=500&h=220&fit=crop&q=80',
  'Luxury':'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=500&h=220&fit=crop&q=80',
  'Night':'https://images.unsplash.com/photo-1556388158-158ea5ccacbd?w=500&h=220&fit=crop&q=80',
  'Sleeper':'https://images.unsplash.com/photo-1464219789935-c2d9d9aba644?w=500&h=220&fit=crop&q=80',
  'Semi-AC':'https://images.unsplash.com/photo-1527786356703-4b100091cd2c?w=500&h=220&fit=crop&q=80',
  'Normal':'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=500&h=220&fit=crop&q=80',
};
const REVIEW_POOL = [
  {name:'Priya S.',stars:5,text:'Very punctual, seats were clean. Driver was careful on the mountain roads.',date:'3 days ago'},
  {name:'Amara K.',stars:4,text:'Good journey, AC was very cold — bring a light jacket!',date:'1 week ago'},
  {name:'Ravi T.',stars:5,text:'Best bus on this route. Comfortable and no unnecessary stops.',date:'2 weeks ago'},
  {name:'Nimal P.',stars:3,text:'Departed 20 mins late but made up time. Seats a bit worn.',date:'3 weeks ago'},
  {name:'Saman W.',stars:5,text:'Smooth ride, USB charging worked great. Would definitely book again.',date:'1 month ago'},
  {name:'Kavitha R.',stars:4,text:'WiFi a bit slow but the bus itself was spotless. Will use again.',date:'1 month ago'},
  {name:'Dinesh M.',stars:2,text:'Bus was late by 40 minutes. No explanation. Journey itself was OK.',date:'6 weeks ago'},
  {name:'Chamara L.',stars:5,text:'Night bus was perfect — arrived early morning feeling fresh!',date:'2 months ago'},
];
function getReviews(seed){const i=seed%REVIEW_POOL.length;return[REVIEW_POOL[i],REVIEW_POOL[(i+1)%REVIEW_POOL.length],REVIEW_POOL[(i+2)%REVIEW_POOL.length]];}
function starsHtml(n){const f=Math.round(n);return'★'.repeat(f)+'☆'.repeat(5-f);}
function renderBadges(amenities){if(!amenities||!amenities.length)return'';return amenities.map(a=>{const c=AMENITY_MAP[a]||{cls:'badge-normal',icon:'•',label:a};return`<span class="badge ${c.cls}">${c.icon} ${c.label}</span>`;}).join('');}
function inferAmenities(opt){const a=[opt.type];if(opt.type==='AC'||opt.type==='Luxury'){a.push('WiFi','USB');}if(opt.type==='Luxury')a.push('Luxury');if(opt.departure&&parseInt(opt.departure)>=19)a.push('Night');if(opt.departure&&parseInt(opt.departure)>=22)a.push('Sleeper');if(opt.type==='AC'&&opt.stops&&opt.stops.length<=2)a.push('Express');return[...new Set(a)];}

function generateLayout(count){
  const rows=Math.ceil(count/4);const layout=[];
  const taken=new Set();while(taken.size<Math.floor(count*.4))taken.add(Math.floor(Math.random()*count)+1);
  let num=1;
  for(let r=0;r<rows;r++){const row=[];for(let c=0;c<4;c++){if(num>count){row.push({id:null,empty:true});continue;}row.push({id:num,taken:taken.has(num),selected:false,empty:false});num++;}layout.push(row);}
  return{layout,selected:[]};
}
function renderSeatMap(idx){
  const ld=expandedLayouts[idx];const container=document.getElementById('layout-'+idx);
  if(!container||!ld)return;container.innerHTML='';
  const drow=document.createElement('div');drow.className='seat-row';drow.innerHTML=`<span style="font-size:10px;color:var(--muted);padding:2px 0">🚗 Front</span>`;container.appendChild(drow);
  ld.layout.forEach(row=>{const rowEl=document.createElement('div');rowEl.className='seat-row';row.forEach((s,ci)=>{if(ci===2){const a=document.createElement('div');a.className='seat-aisle';rowEl.appendChild(a);}if(s.empty){const sp=document.createElement('div');sp.style.width='26px';rowEl.appendChild(sp);return;}const el=document.createElement('div');el.className='seat'+(s.taken?' taken':'')+(s.selected?' selected':'');el.textContent=s.id;if(!s.taken)el.onclick=()=>toggleSeat(idx,s.id);rowEl.appendChild(el);});container.appendChild(rowEl);});
}
function toggleSeat(idx,seatId){
  const ld=expandedLayouts[idx];
  for(const row of ld.layout)for(const s of row)if(s.id===seatId&&!s.taken)s.selected=!s.selected;
  ld.selected=ld.layout.flat().filter(s=>s.selected).map(s=>s.id);
  renderSeatMap(idx);
  const info=document.getElementById('info-'+idx);const btn=document.getElementById('bookbtn-'+idx);const price=parseInt(btn.dataset.price);
  if(ld.selected.length>0){const t=price*ld.selected.length;info.innerHTML=`Seats <strong>${ld.selected.join(', ')}</strong> · Total: <strong>Rs ${t}</strong>`;btn.disabled=false;btn.textContent=`Book ${ld.selected.length} seat${ld.selected.length>1?'s':''} — Rs ${t}`;}
  else{info.textContent='Select a seat to continue';btn.disabled=true;btn.textContent='Select a seat first';}
}

function renderResults(data){
  const card=document.createElement('div');card.className='results-card';
  const hdr=document.createElement('div');hdr.className='results-header';
  hdr.textContent=`${data.from} → ${data.to}  ·  ${data.date}  ·  ${data.options.length} buses found`;card.appendChild(hdr);
  data.options.forEach((opt,idx)=>{
    const seatsLow=opt.seats<=5;const rating=(3.8+((idx*.3+opt.price/1200)%1.2)).toFixed(1);const reviewCount=18+idx*13;
    const amenities=opt.amenities||inferAmenities(opt);
    const optEl=document.createElement('div');optEl.className='bus-option';optEl.id='opt-'+idx;
    const oStr=JSON.stringify(opt).replace(/"/g,'&quot;');const aStr=JSON.stringify(amenities).replace(/"/g,'&quot;');
    optEl.innerHTML=`
      <div class="bus-option-main" onclick="togglePanel(${idx},'${oStr}','${data.from}','${data.to}','${data.date}','${aStr}')">
        <div class="bus-info">
          <div class="bus-top-row"><span class="bus-operator">${opt.operator}</span><div class="amenity-badges">${renderBadges(amenities)}</div></div>
          <div class="bus-details"><span>🕐 ${opt.departure}–${opt.arrival}</span><span>⏱ ${opt.duration}</span><span>📍 ${opt.stops.join(' → ')}</span></div>
          <div class="bus-meta-row">
            <span class="seats-badge ${seatsLow?'seats-low':'seats-ok'}">${seatsLow?'⚠ '+opt.seats+' left':'✓ '+opt.seats+' seats'}</span>
            <span class="star-rating"><span class="stars">${starsHtml(parseFloat(rating))}</span>&nbsp;<strong style="color:var(--accent);font-size:12px">${rating}</strong>&nbsp;<span class="rating-count">(${reviewCount})</span></span>
          </div>
        </div>
        <div class="bus-price">
          <div class="price-amount">Rs ${opt.price}</div>
          <div class="price-label">per seat</div>
          <button class="view-btn" id="viewbtn-${idx}" onclick="event.stopPropagation();togglePanel(${idx},'${oStr}','${data.from}','${data.to}','${data.date}','${aStr}')">Details ▾</button>
        </div>
      </div>
      <div class="bus-expanded-panel" id="panel-${idx}" style="display:none"></div>`;
    card.appendChild(optEl);
  });
  return card;
}

function togglePanel(idx, optStr, from, to, date, amenitiesStr){
  let opt, amenities;
  try{opt=JSON.parse(optStr.replace(/&quot;/g,'"'));}catch(e){return;}
  try{amenities=JSON.parse(amenitiesStr.replace(/&quot;/g,'"'));}catch(e){amenities=[];}
  const panel=document.getElementById('panel-'+idx);const btn=document.getElementById('viewbtn-'+idx);const isOpen=panel.style.display!=='none';
  document.querySelectorAll('.bus-expanded-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('[id^="viewbtn-"]').forEach(b=>b.textContent='Details ▾');
  document.querySelectorAll('.bus-option').forEach(o=>o.classList.remove('expanded'));
  if(isOpen)return;
  panel.style.display='block';btn.textContent='Close ▴';document.getElementById('opt-'+idx).classList.add('expanded');
  if(!panel.innerHTML.trim())buildPanel(panel,idx,opt,from,to,date,amenities);
}

function buildPanel(panel,idx,opt,from,to,date,amenities){
  const reviews=getReviews(idx*7+opt.price);const rating=(3.8+((idx*.3+opt.price/1200)%1.2)).toFixed(1);
  const photo=BUS_PHOTOS[opt.type]||BUS_PHOTOS['Normal'];
  if(!expandedLayouts[idx])expandedLayouts[idx]=generateLayout(opt.seats+10);
  panel.innerHTML=`
  <div class="expanded-inner">
    <div class="exp-left">
      <div class="exp-section-title">Bus Photo</div>
      <img class="bus-photo-img" src="${photo}" alt="${opt.operator}"
        onerror="this.outerHTML='<div style=\\'width:100%;height:130px;border-radius:10px;background:#1f2937;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:36px\\'>🚌</div>'" />
      <div class="exp-section-title">Reviews <span style="color:var(--accent)">${rating}★</span></div>
      ${reviews.map(r=>`<div class="review-item"><div class="review-header"><span class="reviewer-name">${r.name}</span><span class="review-stars">${starsHtml(r.stars)}</span></div><div class="review-text">${r.text}</div><div class="review-date">${r.date}</div></div>`).join('')}
    </div>
    <div class="exp-right">
      <div class="exp-section-title">Choose Your Seat</div>
      <div class="seat-legend">
        <span class="legend-item"><span class="legend-dot ld-avail"></span>Available</span>
        <span class="legend-item"><span class="legend-dot ld-taken"></span>Taken</span>
        <span class="legend-item"><span class="legend-dot ld-selected"></span>Selected</span>
      </div>
      <div class="bus-layout" id="layout-${idx}"></div>
      <div class="seat-info" id="info-${idx}">Select a seat to continue</div>
      <button class="book-btn-full" id="bookbtn-${idx}" data-price="${opt.price}" disabled
        onclick="openModal(${JSON.stringify(opt).replace(/"/g,'&quot;')},'${from}','${to}','${date}',${idx})">
        Select a seat first
      </button>
    </div>
  </div>`;
  renderSeatMap(idx);
}

// ── BOOKING MODAL ──
function openModal(optStr,from,to,date,layoutIdx){
  let opt;try{opt=JSON.parse(optStr.replace ? optStr.replace(/&quot;/g,'"') : JSON.stringify(optStr));}catch(e){opt=optStr;}
  document.getElementById('booking-modal')?.remove();
  const ld=expandedLayouts[layoutIdx];const seats=ld?.selected?.length||1;const total=opt.price*seats;
  const seatsStr=ld?.selected?.join(', ')||'Auto-assigned';
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='booking-modal';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Passenger Details</div><button class="modal-close" onclick="document.getElementById('booking-modal').remove()">✕</button></div>
      <div class="modal-body">
        <div class="booking-summary">
          <div class="bsr"><span>Route</span><span>${from} → ${to}</span></div>
          <div class="bsr"><span>Operator</span><span>${opt.operator}</span></div>
          <div class="bsr"><span>Date</span><span>${date}</span></div>
          <div class="bsr"><span>Departure</span><span>${opt.departure} – ${opt.arrival}</span></div>
          <div class="bsr"><span>Seats</span><span>${seatsStr}</span></div>
          <div class="bsp"><span style="font-size:13px;color:var(--muted)">Total (${seats} seat${seats>1?'s':''})</span><span class="total-val">Rs ${total}</span></div>
        </div>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="pax-name" type="text" placeholder="e.g. Kamal Perera" autocomplete="name"/></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" id="pax-phone" type="tel" placeholder="e.g. 077 123 4567" autocomplete="tel"/></div>
      </div>
      <div class="modal-footer">
        <button class="pay-btn" onclick="proceedToPayment(${JSON.stringify(opt).replace(/"/g,'&quot;')},'${from}','${to}','${date}',${seats},${total},'${seatsStr}')">🔒 Proceed to Payment</button>
        <div class="pay-note">Seat held 10 mins · Lanka QR / Genie / iPay</div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('pax-name')?.focus(),100);
}

function proceedToPayment(optStr,from,to,date,seats,total,seatsStr){
  let opt;try{opt=JSON.parse(optStr.replace ? optStr.replace(/&quot;/g,'"'):JSON.stringify(optStr));}catch(e){opt=optStr;}
  const name=document.getElementById('pax-name').value.trim();
  const phone=document.getElementById('pax-phone').value.trim();
  if(!name){document.getElementById('pax-name').classList.add('error');document.getElementById('pax-name').focus();return;}
  if(!phone){document.getElementById('pax-phone').classList.add('error');document.getElementById('pax-phone').focus();return;}
  document.getElementById('booking-modal').remove();

  // Generate unique booking code
  const ref = genBookingCode(phone);

  const bd={name,phone,seats,operator:opt.operator,from,to,date,departure:opt.departure,arrival:opt.arrival,type:opt.type,price:total,ref,seatsStr,status:'pending',createdAt:new Date().toISOString()};

  // Save as pending immediately
  saveBooking(bd);

  addMessage('user',`Booking: <strong>${name}</strong> · ${phone} · Seats ${seatsStr}`);
  conversationHistory.push({role:'user',content:`Booking for ${name}, phone ${phone}, seats ${seatsStr} on ${opt.operator} ${from} to ${to} ${date} at ${opt.departure}.`});
  const chat=document.getElementById('chat');const w=document.createElement('div');w.style.marginLeft='44px';w.appendChild(renderPending(bd));chat.appendChild(w);chat.scrollTop=chat.scrollHeight;
  addMessage('bot',`Seats <strong>${seatsStr}</strong> on <strong>${opt.operator}</strong> are reserved for <strong>${name}</strong>.<br>Your booking code: <code style="background:var(--surface2);padding:2px 8px;border-radius:4px;color:var(--accent);font-size:13px;letter-spacing:1px">${ref}</code> ⏳`);
}

function renderPending(bd){
  const card=document.createElement('div');card.className='payment-pending-card';card.id='ppc-'+bd.ref;
  const url=`https://pay.yathra.lk/checkout?ref=${bd.ref}&amount=${bd.price}&desc=${encodeURIComponent(bd.from+' to '+bd.to)}`;
  card.innerHTML=`
    <div class="pending-header"><div class="pending-icon">⏳</div><div><div class="pending-title">Seat Reserved — Payment Required</div><div class="pending-subtitle">Held for 10 minutes · Ref: <code style="font-family:monospace;color:var(--accent)">${bd.ref}</code></div></div></div>
    <div class="pending-details">
      <div class="pdr"><span>Passenger</span><span>${bd.name}</span></div>
      <div class="pdr"><span>Phone</span><span>${bd.phone}</span></div>
      <div class="pdr"><span>Route</span><span>${bd.from} → ${bd.to}</span></div>
      <div class="pdr"><span>Operator</span><span>${bd.operator}</span></div>
      <div class="pdr"><span>Seats</span><span>${bd.seatsStr}</span></div>
      <div class="pdr"><span>Departure</span><span>${bd.departure} · ${bd.date}</span></div>
      <div class="pdr" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><span>Amount Due</span><span style="color:var(--accent);font-family:'Playfair Display',serif;font-size:16px">Rs ${bd.price}</span></div>
    </div>
    <a class="pay-link-btn" href="${url}" target="_blank">💳 Pay Now — Rs ${bd.price}</a>
    <button class="simulate-pay-btn" id="sim-${bd.ref}">✓ Simulate payment (demo)</button>
    <div class="pending-ref">Save your code: <code>${bd.ref}</code></div>`;
  setTimeout(()=>{const btn=document.getElementById('sim-'+bd.ref);if(btn)btn.onclick=()=>confirmPayment('ppc-'+bd.ref,bd);},50);
  return card;
}

async function confirmPayment(cardId,bd){
  const card=document.getElementById(cardId);if(!card)return;
  const w=card.parentElement;
  const conf=document.createElement('div');conf.className='confirm-card';
  conf.innerHTML=`
    <div class="confirm-title">✅ Booking Confirmed</div>
    <div class="confirm-row"><span class="confirm-label">Passenger</span><span class="confirm-value">${bd.name}</span></div>
    <div class="confirm-row"><span class="confirm-label">Phone</span><span class="confirm-value">${bd.phone}</span></div>
    <div class="confirm-row"><span class="confirm-label">Route</span><span class="confirm-value">${bd.from} → ${bd.to}</span></div>
    <div class="confirm-row"><span class="confirm-label">Operator</span><span class="confirm-value">${bd.operator}</span></div>
    <div class="confirm-row"><span class="confirm-label">Date</span><span class="confirm-value">${bd.date}</span></div>
    <div class="confirm-row"><span class="confirm-label">Departure</span><span class="confirm-value">${bd.departure}</span></div>
    <div class="confirm-row"><span class="confirm-label">Seats</span><span class="confirm-value">${bd.seatsStr}</span></div>
    <div class="confirm-total"><span style="color:var(--muted);font-size:13px">Total Paid</span><span style="font-family:'Playfair Display',serif;font-size:22px;color:var(--accent)">Rs ${bd.price}</span></div>
    <div class="ref-code">${bd.ref}</div>
    <div class="powered">Show this code to board · Yathra Booking</div>`;
  w.replaceChild(conf,card);

  // Update booking status to confirmed
  bd.status = 'confirmed';
  await updateBookingStatus(bd);

  addMessage('bot',`🎉 <strong>${bd.name}</strong>, your booking is confirmed!<br>Code: <code style="background:var(--surface2);padding:2px 8px;border-radius:4px;color:var(--accent);font-size:13px;letter-spacing:1px">${bd.ref}</code><br>View all your bookings in <strong>My Bookings</strong> tab anytime.`);
  showQuickReplies(['Book another trip','View my bookings']);
}

async function updateBookingStatus(bd) {
  const key = `bookings:${bd.phone}`;
  try {
    const r = await window.storage.get(key, false);
    if (r) {
      let list = JSON.parse(r.value);
      list = list.map(b => b.ref === bd.ref ? {...b, status:'confirmed'} : b);
      await window.storage.set(key, JSON.stringify(list), false);
    }
  } catch(e) {
    if (_localFallback[key]) {
      let list = JSON.parse(_localFallback[key]);
      list = list.map(b => b.ref === bd.ref ? {...b, status:'confirmed'} : b);
      _localFallback[key] = JSON.stringify(list);
    }
  }
}

// ── CHAT ──
const systemPrompt=`You are Yathra, a friendly Sri Lanka long-distance bus booking assistant. Speak the user's language (English, Sinhala, Tamil).

When a user asks about a route, give a 1-2 sentence reply then output:
|||JSON
{"type":"results","from":"CITY","to":"CITY","date":"DATE","options":[
  {"id":1,"operator":"NAME","departure":"HH:MM","arrival":"HH:MM","duration":"Xh","price":NNN,"seats":NN,"stops":["Stop1","Stop2"],"type":"AC","amenities":["AC","WiFi","USB","Express"]},
  ...
]}
|||

amenities: AC, Semi-AC, Normal, Night (departs after 19:00), WiFi, USB, Sleeper, Express, Luxury. Prices: Normal 200-400, Semi-AC 350-600, AC 500-900 LKR. Use real Sri Lankan cities and operators. Keep text SHORT.`;

function setLang(lang,btn){document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function addMessage(role,content,extra=null){
  const chat=document.getElementById('chat');const msg=document.createElement('div');msg.className=`message ${role}`;
  const av=document.createElement('div');av.className='avatar';av.textContent=role==='bot'?'🚌':'👤';
  const bu=document.createElement('div');bu.className='bubble';if(content)bu.innerHTML=content;
  msg.appendChild(av);msg.appendChild(bu);chat.appendChild(msg);
  if(extra){const w=document.createElement('div');w.style.marginLeft=role==='bot'?'44px':'0';w.appendChild(extra);chat.appendChild(w);}
  chat.scrollTop=chat.scrollHeight;return bu;
}
function showTyping(){const chat=document.getElementById('chat');const m=document.createElement('div');m.className='message bot';m.id='typing-indicator';const av=document.createElement('div');av.className='avatar';av.textContent='🚌';const bu=document.createElement('div');bu.className='bubble';bu.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';m.appendChild(av);m.appendChild(bu);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;}
function hideTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}
function showQuickReplies(replies){
  const chat=document.getElementById('chat');const c=document.createElement('div');c.className='quick-replies';c.style.marginLeft='44px';c.style.marginBottom='4px';
  replies.forEach(r=>{const btn=document.createElement('button');btn.className='quick-reply';btn.textContent=r;
    btn.onclick=()=>{c.remove();
      if(r==='View my bookings'){switchTab('bookings');return;}
      document.getElementById('userInput').value=r;sendMessage();};
    c.appendChild(btn);});
  chat.appendChild(c);chat.scrollTop=chat.scrollHeight;
}
async function callClaude(){
  if(isTyping)return;isTyping=true;document.getElementById('sendBtn').disabled=true;showTyping();
  try{
    const res=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:systemPrompt,messages:conversationHistory})});
    const data=await res.json();hideTyping();
    const raw=data.content?.[0]?.text||"Sorry, couldn't connect. Please try again.";
    const jm=raw.match(/\|\|\|JSON\s*([\s\S]*?)\s*\|\|\|/);
    const txt=raw.replace(/\|\|\|JSON[\s\S]*?\|\|\|/g,'').trim();
    let extra=null;
    if(jm){try{const p=JSON.parse(jm[1]);if(p.type==='results')extra=renderResults(p);}catch(e){}}
    if(txt){addMessage('bot',txt,extra);}else if(extra){const chat=document.getElementById('chat');const w=document.createElement('div');w.style.marginLeft='44px';w.appendChild(extra);chat.appendChild(w);chat.scrollTop=chat.scrollHeight;}
    conversationHistory.push({role:'assistant',content:raw});
    if(jm)showQuickReplies(['Cheapest option?','Any night buses?','Different date']);
    else if(conversationHistory.length<=3)showQuickReplies(['Colombo to Jaffna tonight','Colombo to Kandy Friday','Kandy to Galle Saturday']);
  }catch(e){hideTyping();addMessage('bot','Connection issue — please try again.');}
  isTyping=false;document.getElementById('sendBtn').disabled=false;
}
async function sendMessage(){const inp=document.getElementById('userInput');const t=inp.value.trim();if(!t||isTyping)return;inp.value='';inp.style.height='auto';addMessage('user',t);conversationHistory.push({role:'user',content:t});callClaude();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── iOS VIEWPORT / KEYBOARD FIXES ──
// Scroll chat to bottom reliably on iOS
function scrollChatBottom(){
  const chat=document.getElementById('chat');
  if(!chat)return;
  // Double rAF ensures layout is complete before scrolling (needed on iOS)
  requestAnimationFrame(()=>requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight;}));
}
// Patch addMessage to use reliable scroll
const _origAddMessage=addMessage;

// Visual viewport resize handler for iOS keyboard
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    // When keyboard opens/closes on iOS, adjust layout height
    const vh=window.visualViewport.height;
    document.documentElement.style.setProperty('--visible-vh',vh+'px');
  });
}

  setTimeout(()=>{

    setTimeout(()=>showQuickReplies(['Colombo to Jaffna tonight','Colombo to Kandy Friday','Kandy to Galle Saturday']),400);
  },300);
};
